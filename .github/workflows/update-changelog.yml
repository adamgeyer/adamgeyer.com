name: Update Changelog

# Triggers on every push to main. No PR needed anywhere in this flow —
# just include a line like "changelog: <description>" in your commit message.
on:
  push:
    branches: [main]

jobs:
  update-changelog:
    # Only runs if the commit message contains "changelog:"
    if: contains(github.event.head_commit.message, 'changelog:')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract changelog line and update whats-new-data.js
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dataPath = 'whats-new-data.js';
            const message = context.payload.head_commit.message;

            // Look for "changelog: <description>" anywhere in the commit message
            const match = message.match(/changelog:\s*(.+)/i);
            const description = match ? match[1].trim() : '';

            if (!description) {
              core.setFailed(
                "Commit message contained 'changelog:' but no description followed it. " +
                "Use a format like: 'changelog: Added a dark mode toggle.'"
              );
              return;
            }

            const title = message.split('\n')[0]; // first line of commit message
            const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            const newEntry = {
              title: title,
              date: date,
              description: description,
              commit: context.sha.substring(0, 7)
            };

            let entries = [];
            if (fs.existsSync(dataPath)) {
              const existing = fs.readFileSync(dataPath, 'utf8');
              const arrayMatch = existing.match(/const CHANGELOG\s*=\s*(\[[\s\S]*?\]);/);
              if (arrayMatch) entries = JSON.parse(arrayMatch[1]);
            }

            entries.unshift(newEntry); // newest entry goes first

            const fileContents =
              `// Auto-updated by .github/workflows/update-changelog.yml — do not edit the array shape by hand\n` +
              `const CHANGELOG = ${JSON.stringify(entries, null, 2)};\n`;

            fs.writeFileSync(dataPath, fileContents);

            console.log('New entry:', newEntry);

      - name: Commit and push directly to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whats-new-data.js
          # [skip ci] avoids accidentally re-triggering this same workflow on the bot's own commit
          git diff --staged --quiet || git commit -m "Update changelog from commit ${{ github.sha }} [skip ci]"
          git push
